<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Detail — QueueLens</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #030712; color: #f9fafb; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .toast {
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function StatusBadge({ status }) {
      const styles = {
        failed:    'bg-red-900/50 text-red-400 border border-red-800/60',
        completed: 'bg-green-900/30 text-green-400 border border-green-800/40',
        active:    'bg-blue-900/50 text-blue-400 border border-blue-800/60',
        waiting:   'bg-yellow-900/30 text-yellow-400 border border-yellow-800/40',
      };
      return (
        <span className={`mono text-sm px-3 py-1 rounded-full font-medium ${styles[status] || styles.waiting}`}>
          {status}
        </span>
      );
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function Toast({ message, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 3500);
        return () => clearTimeout(t);
      }, []);
      return (
        <div className="toast fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-gray-950 font-semibold px-6 py-3 rounded-full shadow-xl text-sm flex items-center gap-2">
          <span>✓</span> {message}
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [toast, setToast] = useState(null);
      const [retrying, setRetrying] = useState(false);

      const jobId = window.location.pathname.split('/job/')[1];

      useEffect(() => {
        fetch(`/api/jobs/${encodeURIComponent(jobId)}`)
          .then(r => {
            if (!r.ok) throw new Error('Job not found');
            return r.json();
          })
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, [jobId]);

      function handleRetry() {
        setRetrying(true);
        fetch(`/api/jobs/${encodeURIComponent(jobId)}/retry`, { method: 'POST' })
          .then(r => r.json())
          .then(result => {
            setToast(result.message);
            setRetrying(false);
          })
          .catch(() => {
            setToast(`Job ${jobId} queued for retry.`);
            setRetrying(false);
          });
      }

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center">
          <span className="text-gray-500 text-sm">Loading...</span>
        </div>
      );

      if (error) return (
        <div className="min-h-screen flex items-center justify-center">
          <span className="text-red-400 text-sm">{error}</span>
        </div>
      );

      const { job, attempts } = data;
      let payload;
      try { payload = JSON.stringify(JSON.parse(job.payload), null, 2); }
      catch { payload = job.payload; }

      return (
        <div className="min-h-screen">
          <div className="flex">
            {/* Sidebar */}
            <aside className="w-56 min-h-screen bg-gray-950 border-r border-gray-800 fixed left-0 top-0">
              <div className="px-5 h-14 flex items-center border-b border-gray-800">
                <a href="/" className="text-white font-bold text-lg tracking-tight">
                  Queue<span className="text-green-400">Lens</span>
                </a>
              </div>
              <nav className="p-3">
                <a href="/dashboard" className="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors mb-1">
                  ← All queues
                </a>
                {job.queue_name && (
                  <a href={`/dashboard/queue/${job.queue_name}`} className="flex items-center gap-2 px-2 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">
                    ← {job.queue_name}
                  </a>
                )}
              </nav>
            </aside>

            {/* Main */}
            <main className="ml-56 flex-1 min-h-screen">
              <header className="h-14 border-b border-gray-800 flex items-center justify-between px-8 bg-gray-950/80 backdrop-blur sticky top-0 z-10">
                <nav className="text-sm text-gray-500 flex items-center gap-2">
                  <a href="/dashboard" className="hover:text-white transition-colors">Dashboard</a>
                  <span>/</span>
                  <a href={`/dashboard/queue/${job.queue_name}`} className="hover:text-white transition-colors">{job.queue_name}</a>
                  <span>/</span>
                  <span className="mono text-white">{job.id}</span>
                </nav>
                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setToast(`Job ${job.id} discarded.`)}
                    className="text-sm text-gray-500 hover:text-red-400 border border-gray-700 hover:border-red-800/60 px-4 py-1.5 rounded-full transition-colors"
                  >
                    Discard
                  </button>
                  <button
                    onClick={handleRetry}
                    disabled={retrying}
                    className="text-sm bg-green-500 hover:bg-green-400 disabled:opacity-50 text-gray-950 font-semibold px-5 py-1.5 rounded-full transition-colors"
                  >
                    {retrying ? 'Retrying...' : 'Retry Job'}
                  </button>
                </div>
              </header>

              <div className="p-8 space-y-6 max-w-4xl">

                {/* Identity + status */}
                <div className="bg-gray-900 rounded-xl p-5 border border-gray-800">
                  <div className="flex items-center justify-between mb-4">
                    <div>
                      <div className="mono text-white font-bold text-xl">{job.id}</div>
                      <div className="text-sm text-gray-500 mt-0.5">in <span className="text-gray-300">{job.queue_name}</span></div>
                    </div>
                    <StatusBadge status={job.status} />
                  </div>
                  <div className="grid grid-cols-3 gap-4 pt-4 border-t border-gray-800">
                    <div>
                      <div className="text-xs text-gray-500 mb-1">Created at</div>
                      <div className="text-sm text-gray-300">{formatDate(job.created_at)}</div>
                    </div>
                    <div>
                      <div className="text-xs text-gray-500 mb-1">Processed at</div>
                      <div className="text-sm text-gray-300">{formatDate(job.processed_at)}</div>
                    </div>
                    <div>
                      <div className="text-xs text-gray-500 mb-1">Failed at</div>
                      <div className="text-sm text-red-400">{formatDate(job.failed_at)}</div>
                    </div>
                  </div>
                </div>

                {/* Payload */}
                <div className="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
                  <div className="px-5 py-3 border-b border-gray-800">
                    <span className="text-sm font-semibold text-white">Payload</span>
                  </div>
                  <pre className="mono text-sm text-green-300 p-5 overflow-x-auto leading-relaxed">{payload}</pre>
                </div>

                {/* Error */}
                {job.error_message && (
                  <div className="bg-gray-900 rounded-xl border border-red-900/40 overflow-hidden">
                    <div className="px-5 py-3 border-b border-red-900/40 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-red-500 inline-block"></span>
                      <span className="text-sm font-semibold text-red-400">Error</span>
                    </div>
                    <div className="p-5">
                      <div className="text-red-300 font-medium mb-4">{job.error_message}</div>
                      {job.stack_trace && (
                        <pre className="mono text-xs text-gray-500 leading-relaxed overflow-x-auto whitespace-pre-wrap border-t border-gray-800 pt-4">{job.stack_trace}</pre>
                      )}
                    </div>
                  </div>
                )}

                {/* Attempt history */}
                {attempts && attempts.length > 0 && (
                  <div className="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
                    <div className="px-5 py-3 border-b border-gray-800">
                      <span className="text-sm font-semibold text-white">Attempt History</span>
                      <span className="text-xs text-gray-500 ml-2">{attempts.length} of {job.max_attempts} max attempts</span>
                    </div>
                    <div className="divide-y divide-gray-800">
                      {attempts.map(a => (
                        <div key={a.id} className="px-5 py-3.5 flex items-start gap-4">
                          <span className="mono text-xs text-gray-600 mt-0.5 w-16 flex-shrink-0">#{a.attempt_number}</span>
                          <div className="flex-1 min-w-0">
                            <div className="text-xs text-gray-400 mb-1">{formatDate(a.attempted_at)}</div>
                            {a.error && <div className="mono text-xs text-red-400 truncate">{a.error}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

              </div>
            </main>
          </div>

          {toast && <Toast message={toast} onDone={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
