<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — QueueLens</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #030712; color: #f9fafb; }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function StatusBadge({ count, type }) {
      const styles = {
        waiting:   'text-yellow-400',
        active:    'text-blue-400',
        completed: 'text-gray-400',
        failed:    count > 0 ? 'text-red-400 font-bold' : 'text-gray-500',
      };
      return <span className={styles[type]}>{count.toLocaleString()}</span>;
    }

    function QueueCard({ queue }) {
      return (
        <a
          href={`/dashboard/queue/${queue.name}`}
          className="block bg-gray-900 rounded-xl p-5 border border-gray-800 hover:border-gray-600 transition-colors cursor-pointer"
        >
          <div className="flex justify-between items-start mb-4">
            <div>
              <div className="text-white font-semibold">{queue.name}</div>
              <div className="mono text-xs text-blue-400 mt-0.5">{queue.framework}</div>
            </div>
            {queue.failed > 0 && (
              <span className="text-xs bg-red-900/40 text-red-400 border border-red-800/50 px-2 py-0.5 rounded-full font-semibold">
                {queue.failed} failed
              </span>
            )}
          </div>
          <div className="grid grid-cols-2 gap-3 text-sm">
            <div>
              <div className="text-xl font-bold"><StatusBadge count={queue.waiting} type="waiting" /></div>
              <div className="text-gray-500 text-xs mt-0.5">waiting</div>
            </div>
            <div>
              <div className="text-xl font-bold"><StatusBadge count={queue.active} type="active" /></div>
              <div className="text-gray-500 text-xs mt-0.5">active</div>
            </div>
            <div>
              <div className="text-xl font-bold"><StatusBadge count={queue.completed} type="completed" /></div>
              <div className="text-gray-500 text-xs mt-0.5">completed</div>
            </div>
            <div>
              <div className="text-xl font-bold"><StatusBadge count={queue.failed} type="failed" /></div>
              <div className="text-gray-500 text-xs mt-0.5">failed</div>
            </div>
          </div>
          <div className="mt-4 pt-3 border-t border-gray-800 flex justify-between text-xs text-gray-500">
            <span>avg {(queue.avg_duration_ms / 1000).toFixed(1)}s / job</span>
            <span className="text-gray-600">→ drill in</span>
          </div>
        </a>
      );
    }

    function AddConnectionModal({ onClose }) {
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
          <div className="bg-gray-900 border border-gray-700 rounded-xl p-6 w-full max-w-md mx-4">
            <h3 className="text-white font-semibold mb-1">Add Queue Connection</h3>
            <p className="text-gray-400 text-sm mb-5">Paste a Redis or Postgres URL to connect a queue framework.</p>
            <div className="space-y-4">
              <div>
                <label className="block text-xs text-gray-400 mb-1.5">Connection URL</label>
                <input
                  type="text"
                  placeholder="redis://user:pass@host:6379"
                  className="mono w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:border-green-500"
                  readOnly
                />
              </div>
              <div>
                <label className="block text-xs text-gray-400 mb-1.5">Framework</label>
                <select className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-green-500">
                  <option>BullMQ (Node.js)</option>
                  <option>Sidekiq (Ruby)</option>
                  <option>Celery (Python)</option>
                </select>
              </div>
            </div>
            <div className="flex gap-3 mt-6">
              <button
                onClick={onClose}
                className="flex-1 border border-gray-700 hover:border-gray-500 text-gray-400 hover:text-white rounded-full py-2 text-sm transition-colors"
              >
                Cancel
              </button>
              <button
                onClick={onClose}
                className="flex-1 bg-green-500 hover:bg-green-400 text-gray-950 font-semibold rounded-full py-2 text-sm transition-colors"
              >
                Connect (demo)
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [queues, setQueues] = useState([]);
      const [loading, setLoading] = useState(true);
      const [lastUpdated, setLastUpdated] = useState(0);
      const [showModal, setShowModal] = useState(false);

      useEffect(() => {
        fetch('/api/queues')
          .then(r => r.json())
          .then(data => {
            setQueues(data);
            setLoading(false);
            setLastUpdated(0);
          });

        const interval = setInterval(() => {
          setLastUpdated(s => s + 1);
        }, 1000);
        return () => clearInterval(interval);
      }, []);

      const totalFailed = queues.reduce((sum, q) => sum + q.failed, 0);

      return (
        <div className="min-h-screen">
          {/* Sidebar + main layout */}
          <div className="flex">
            {/* Sidebar */}
            <aside className="w-56 min-h-screen bg-gray-950 border-r border-gray-800 fixed left-0 top-0 flex flex-col">
              <div className="px-5 h-14 flex items-center border-b border-gray-800">
                <a href="/" className="text-white font-bold text-lg tracking-tight">
                  Queue<span className="text-green-400">Lens</span>
                </a>
              </div>
              <nav className="p-3 flex-1">
                <div className="text-xs text-gray-500 uppercase tracking-widest px-2 py-2">Queues</div>
                {queues.map(q => (
                  <a
                    key={q.name}
                    href={`/dashboard/queue/${q.name}`}
                    className="flex justify-between items-center px-2 py-1.5 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition-colors"
                  >
                    <span className="truncate">{q.name}</span>
                    {q.failed > 0 && (
                      <span className="text-xs bg-red-900/50 text-red-400 rounded-full px-1.5 py-0.5 ml-1 flex-shrink-0">{q.failed}</span>
                    )}
                  </a>
                ))}
              </nav>
              <div className="p-3 border-t border-gray-800">
                <button
                  onClick={() => setShowModal(true)}
                  className="w-full text-sm text-green-400 hover:text-green-300 border border-green-900/50 hover:border-green-700 rounded-lg py-2 transition-colors"
                >
                  + Add Connection
                </button>
              </div>
            </aside>

            {/* Main */}
            <main className="ml-56 flex-1 min-h-screen">
              <header className="h-14 border-b border-gray-800 flex items-center justify-between px-8 bg-gray-950/80 backdrop-blur sticky top-0 z-10">
                <div className="flex items-center gap-4">
                  <h1 className="text-white font-semibold">Dashboard</h1>
                  {totalFailed > 0 && (
                    <span className="text-xs bg-red-900/40 border border-red-800/50 text-red-400 px-2 py-0.5 rounded-full">
                      {totalFailed} total failures
                    </span>
                  )}
                </div>
                <span className="text-xs text-gray-500">
                  Last updated: {lastUpdated === 0 ? 'just now' : `${lastUpdated}s ago`}
                </span>
              </header>

              <div className="p-8">
                {loading ? (
                  <div className="text-gray-500 text-sm">Loading queues...</div>
                ) : (
                  <>
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                      {queues.map(q => <QueueCard key={q.name} queue={q} />)}
                    </div>
                    <div className="mt-8 p-4 bg-gray-900/50 border border-gray-800 rounded-xl text-sm text-gray-500 flex items-center justify-between">
                      <span>Showing {queues.length} connected queues — 1 of 2 free connections used</span>
                      <button
                        onClick={() => setShowModal(true)}
                        className="text-green-400 hover:text-green-300 text-xs underline underline-offset-4"
                      >
                        Add connection
                      </button>
                    </div>
                  </>
                )}
              </div>
            </main>
          </div>

          {showModal && <AddConnectionModal onClose={() => setShowModal(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
